version: '3.8'
services:
  invoice-ai:
    build:
      context: .
      dockerfile: invoice-ai/Dockerfile
    image: invoice-ai:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Optional env vars; set in your host or an env file
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOCAL_LLM_URL=${LOCAL_LLM_URL}
    restart: unless-stopped
    # If you want to mount a local .env.local for quick testing on the host
    # volumes:
    #   - ./invoice-ai/.env.local:/app/invoice-ai/.env.local:ro

